version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: infra/Dockerfile.scraper
    env_file: .env
    volumes:
      - ./data:/app/data
    profiles:
      - scraper

  pipeline:
    build:
      context: .
      dockerfile: infra/Dockerfile.scraper
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m pipeline.run
    profiles:
      - pipeline

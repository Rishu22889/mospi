version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    container_name: mospi_ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: mospi_api
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - DB_PATH=/app/data/mospi.db
      - VECTOR_INDEX_PATH=/app/data/processed/faiss_index
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    container_name: mospi_ui
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: infra/Dockerfile.scraper
    container_name: mospi_scraper
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
    env_file: .env
    profiles:
      - scraper
    restart: "no"

  pipeline:
    build:
      context: .
      dockerfile: infra/Dockerfile.pipeline
    container_name: mospi_pipeline
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
    env_file: .env
    profiles:
      - pipeline
    restart: "no"

volumes:
  ollama_data:
